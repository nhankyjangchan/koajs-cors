name: 💡 Feature request
description: Suggest an idea for this package
title: '[FEATURE] '
labels: ['enhancement']
assignees: ['nhankyjangchan']
body:
    - type: markdown
      id: feature_request-header
      attributes:
          value: |
              ⚠️ **Before filling this form:** Please ensure you've read the [documentation](https://github.com/nhankyjangchan/koajs-cors) and searched for [existing issues](https://github.com/nhankyjangchan/koajs-cors/issues).

    - type: textarea
      id: problem_description
      attributes:
          label: Is your feature request related to a problem? Please describe
          description: A clear and concise description of what the problem is.
          placeholder: I'm always frustrated when [...]
      validations:
          required: true

    - type: textarea
      id: problem_solution
      attributes:
          label: Describe the solution you'd like
          description: A clear and concise description of what you want to happen.
          placeholder: It would be great if the library could [...]
      validations:
          required: false

    - type: textarea
      id: feature_description
      attributes:
          label: Describe features or alternatives you've considered
          description: A clear and concise description of any alternative solutions or features you've considered.
          placeholder: I've tried to work around this by [...], but it's not ideal because [...]
      validations:
          required: true

    - type: textarea
      id: feature_context
      attributes:
          label: Additional context
          description: Add any other context about the feature request here.
          placeholder: Paste something here...
      validations:
          required: false

    - type: markdown
      id: feature_request-footer
      attributes:
          value: 💙 Thanks for helping improve this package!
